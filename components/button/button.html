{% if href %}
    <a href="{{ href }}" class="button{% if tone %} button--{{ tone }}{% endif %}" {% if id %}id="{{ id }}"{% endif %}>
        {{ label }}
    </a>
{% else %}
    <button type="{{ type }}" class="button{% if tone %} button--{{ tone }}{% endif %}" {% if id %}id="{{ id }}"{% endif %}>
        {{ label }}
    </button>
{% endif %}
